name: Flujo DevOps Grupo 4

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Dar permisos a Gradle
        run: chmod +x gradlew

      - name: Construir el proyecto (Build)
        run: ./gradlew assemble

      - name: Guardar el JAR generado
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*-SNAPSHOT.jar

  test:
    name: Test
    runs-on: ubuntu-latest
    # --- NUEVO: Levantar base de datos temporal en GitHub ---
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # --------------------------------------------------------
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Dar permisos a Gradle
        run: chmod +x gradlew

      - name: Ejecutar Tests Unitarios
        run: ./gradlew test
        # --- NUEVO: Conectar los tests a la base de datos temporal ---
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  deploy:
    name: Deploy
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./app-build

      - name: Copiar JAR al servidor EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./app-build/*-SNAPSHOT.jar"
          target: "/home/ec2-user/"
          strip_components: 1

      - name: Ejecutar la aplicación en EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Deteniendo versión anterior..."
            pkill -f 'java -jar' || true
            sleep 5
            echo "Iniciando nueva versión conectada al RDS..."
            export SPRING_DATASOURCE_URL=jdbc:postgresql://${{ secrets.RDS_ENDPOINT }}:5432/postgres
            export SPRING_DATASOURCE_USERNAME=postgres
            export SPRING_DATASOURCE_PASSWORD=postgres
            nohup java -jar /home/ec2-user/*-SNAPSHOT.jar > /home/ec2-user/app.log 2>&1 &
            echo "¡Despliegue completado con éxito!"